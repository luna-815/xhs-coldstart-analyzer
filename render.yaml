services:
  - type: web
    name: xhs-coldstart-backend
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python -m uvicorn server.main:app --host 0.0.0.0 --port $PORT
    autoDeploy: true
    envVars:
      - key: ARK_API_KEY
        sync: false
      - key: ARK_MODEL_ID
        value: doubao-seed-2-0-pro-260215
      - key: ARK_HTTP_READ_TIMEOUT
        value: "180"
      - key: CORS_ALLOW_ORIGINS
        value: "*"
      - key: DEBUG_API
        value: "0"
